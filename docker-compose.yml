services:
  postgres:
    image: postgres:16-alpine
    container_name: roadmap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: roadmap
      POSTGRES_PASSWORD: roadmap_secret
      POSTGRES_DB: roadmap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmap -d roadmap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roadmap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: roadmap_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://roadmap:roadmap_secret@postgres:5432/roadmap_db
      REDIS_URL: redis://:redis_secret@redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
